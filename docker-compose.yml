services:
  postgres:
    image: postgres:16
    container_name: media-search-db
    environment:
      POSTGRES_USER: media_search
      POSTGRES_PASSWORD: media_search
      POSTGRES_DB: media_search
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_search -d media_search"]
      interval: 5s
      timeout: 5s
      retries: 5

  quickwit:
    image: quickwit/quickwit:0.8.1
    container_name: media-search-quickwit
    ports:
      - "127.0.0.1:7280:7280"
    volumes:
      - quickwit_data:/quickwit/qwdata
    environment:
      QW_ENABLE_OTLP_ENDPOINT: "false"
    command: run
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7280/health/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  quickwit_data:
